<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morenda | Příprava Velikonoční výzvy</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐰</text></svg>">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Svěží jarní přechod (zelenkavá do žlutavé) */
            background: linear-gradient(135deg, #a8e6cf 0%, #dcedc1 100%); 
            color: #333; /* Tmavší text, protože pozadí je teď světlé */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .box {
            background: rgba(255, 255, 255, 0.95); /* Bílý rámeček pro lepší čitelnost */
            padding: 40px;
            border-radius: 20px;
            border: 3px dashed #ffb7b2; /* Pastelově růžové ohraničení */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); /* Jemný stín, aby box vystoupil */
            max-width: 500px;
        }
        h1 { 
            font-size: 3.5rem; 
            margin: 0; 
        }
        h2 {
            color: #2ca58d; /* Svěží zelená barva nadpisu */
            margin-top: 15px;
            font-size: 1.8rem;
        }
        p { 
            font-size: 1.2rem; 
            margin-top: 20px; 
            line-height: 1.6;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🐣 🌷 🐰</h1>
        <h2>Velikonoční zajíčci pracují</h2>
        <p>Stránka se odemkne až ve správný čas.<br><br>Zajíčci vás budou o startu informovat ve WhatsApp skupinách.</p>
    </div>
</body>
</html>
